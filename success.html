<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Спасибо!</title>
<style>
body {
  font-family: Arial, sans-serif;
  background:
    linear-gradient(rgba(24, 24, 24, 0.78), rgba(24, 24, 24, 0.78)),
    url('https://static.tildacdn.com/tild6435-3135-4462-a466-316437313165/Rectangle_547.png') center center / cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 20px;
  box-sizing: border-box;
}

.container {
  background-color: rgba(255, 255, 255, 0.96);
  padding: 30px 40px;
  border-radius: 10px;
  box-shadow: 0 18px 45px rgba(0, 0, 0, 0.3);
  text-align: center;
  max-width: 720px;
  width: 100%;
}

h1 {
  color: #f14b17;
  margin-bottom: 20px;
}

p {
  font-size: 1.1em;
  color: #333;
  line-height: 1.5;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 1em;
  background-color: #f14b17;
  color: #fff;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  text-decoration: none;
  transition: background-color 0.2s ease;
}

button:hover {
  background-color: #d64716;
}
</style>
</head>
<body>

<div class="container">
  <h1>Ваше письмо отправлено!</h1>
  <p>С вами скоро свяжутся. Спасибо за обращение!</p>
  <a href="index.htm"><button>Вернуться на главную</button></a>
</div>

</body>
</html>
